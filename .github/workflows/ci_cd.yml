name: ML Pipeline CI/CD


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3


      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'


      - name: Instalar dependencias
        run: pip install -r requirements.txt


      - name: Generar datos de prueba
        run: python -c "
import pandas as pd, numpy as np
np.random.seed(42)
t = ['Good results']*100 + ['Bad losses']*100
l = [1]*100 + [0]*100
pd.DataFrame({'text':t,'label':l}).to_csv('data/sentiment_data.csv',index=False)"


      - name: Entrenar modelo
        run: python src/train.py


      - name: Ejecutar tests
        run: pytest tests/ -v


      - name: Validar AUC
        run: python -c "
import json
with open('metrics.json') as f: m=json.load(f)
assert m['auc']>=0.60, f'AUC {m["auc"]:.3f} bajo umbral'
print(f'AUC={m["auc"]:.3f} OK')"


      - name: Guardar modelo como artefacto
        uses: actions/upload-artifact@v3
        with:
          name: modelo-sentimiento
          path: modelo_sentimiento.joblib
